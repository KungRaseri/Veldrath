services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: realmunbound
      POSTGRES_USER: realmunbound
      POSTGRES_PASSWORD: realmunbound_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realmunbound"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: RealmUnbound.Server/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/realmunbound.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=realmunbound;Username=realmunbound;Password=realmunbound_dev
      - Database__Provider=postgres
      - Jwt__Key=${JWT_SECRET_KEY:?JWT_SECRET_KEY env var must be set}
      - Jwt__Issuer=RealmUnbound.Server
      - Jwt__Audience=RealmUnbound.Client
    volumes:
      # Bind-mount JSON catalog so local edits are reflected immediately in dev
      - ./RealmEngine.Data/Data/Json:/app/Data/Json:ro
      # ASP.NET dev cert (export once: dotnet dev-certs https -ep "$env:USERPROFILE\.aspnet\https\realmunbound.pfx" -p "<CERT_PASSWORD>")
      - ${USERPROFILE}/.aspnet/https:/https:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
