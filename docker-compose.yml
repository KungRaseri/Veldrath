# Development docker-compose — HTTP only, no certs required.
# appsettings.Development.json supplies the JWT key and log levels.
# Only the database connection is overridden here to point at the Postgres container.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: realmunbound
      POSTGRES_USER: realmunbound
      POSTGRES_PASSWORD: realmunbound_dev
    ports:
      - "5433:5432"   # host:container — use 5433 to avoid conflicts with other local Postgres instances
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realmunbound"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: RealmUnbound.Server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # Override DB to the Postgres container; everything else comes from appsettings.Development.json
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=realmunbound;Username=realmunbound;Password=realmunbound_dev
      - Database__Provider=postgres
      # JWT signing key — set in .env, never hardcode here
      - Jwt__Key=${JWT_KEY}
      # OAuth provider credentials — set in .env, never hardcode here
      - OAuth__Discord__ClientId=${OAUTH_DISCORD_CLIENT_ID}
      - OAuth__Discord__ClientSecret=${OAUTH_DISCORD_CLIENT_SECRET}
      - OAuth__Google__ClientId=${OAUTH_GOOGLE_CLIENT_ID}
      - OAuth__Google__ClientSecret=${OAUTH_GOOGLE_CLIENT_SECRET}
      - OAuth__Microsoft__ClientId=${OAUTH_MICROSOFT_CLIENT_ID}
      - OAuth__Microsoft__ClientSecret=${OAUTH_MICROSOFT_CLIENT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys

  discord:
    build:
      context: .
      dockerfile: RealmUnbound.Discord/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Development
      # Bot token — set via .env file or shell environment, never hardcoded here.
      # Create a .env file at the repo root with: DISCORD_TOKEN=your_token_here
      - Discord__Token=${DISCORD_TOKEN}
      # Optional: set to your dev server ID for instant slash command registration.
      # Leave as 0 (or unset) to register commands globally in production.
      - Discord__DevGuildId=${DISCORD_DEV_GUILD_ID:-0}
      # Use the Docker service name — "localhost" inside the container refers to itself, not the server.
      - Discord__ServerBaseUrl=http://server:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=realmunbound;Username=realmunbound;Password=realmunbound_dev
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: unless-stopped

  foundry:
    build:
      context: .
      dockerfile: RealmFoundry/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8081
      # Internal URL for server-side HttpClient calls (container-to-container)
      - RealmUnbound__ServerUrl=http://server:8080
      # Public URL the browser navigates to for OAuth redirects
      - RealmUnbound__PublicServerUrl=http://localhost:8080
    volumes:
      - foundry_dataprotection_keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
  dataprotection_keys:
  foundry_dataprotection_keys:
