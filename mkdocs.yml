site_name: RealmEngine Documentation
site_description: RPG backend engine and tooling — CQRS architecture with MediatR, JSON data pipeline, and RealmUnbound multiplayer client/server.
site_url: https://kungraseri.github.io/RealmEngine/
repo_url: https://github.com/KungRaseri/RealmEngine
repo_name: KungRaseri/RealmEngine
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Game Design:
    - Game Design Document: GDD-Main.md
    - Roadmap: ROADMAP.md
  - Architecture:
    - API Specification: API_SPECIFICATION.md
    - Commands & Queries: COMMANDS_AND_QUERIES_INDEX.md
    - CQRS Implementation: CQRS_IMPLEMENTATION_STATUS.md
    - Implementation Status: IMPLEMENTATION_STATUS.md
    - Service Registration: SERVICE_REGISTRATION_REPORT.md
    - Exception Logging: EXCEPTION_LOGGING_GUIDE.md
  - Game Systems:
    - Overview: systems/CURRENT_SYSTEMS_REVIEW.md
    - Abilities: features/abilities-system.md
    - Character: features/character-system.md
    - Combat: features/combat-system.md
    - Crafting: features/crafting-system.md
    - Exploration: features/exploration-system.md
    - Inventory: features/inventory-system.md
    - Magic & Spells: features/magic-spell-system.md
    - Progression: features/progression-system.md
    - Quests: features/quest-system.md
    - Shop: features/shop-system-integration.md
    - Skills: features/skills-system.md
    - Status Effects: features/status-effects-system.md
    - Save & Load: features/save-load-system.md
  - Data Standards:
    - Overview: standards/README.md
    - JSON Standards: standards/json/README.md
    - Catalog Standard: standards/json/CATALOG_JSON_STANDARD.md
    - Names Standard: standards/json/NAMES_JSON_STANDARD.md
    - Reference System: standards/json/JSON_REFERENCE_STANDARDS.md
    - Enemy Standard v5: standards/json/ENEMY_JSON_STANDARD_v5.md
    - Migration Guide v5: standards/json/MIGRATION_GUIDE_v5.md
    - Trait Standards: standards/json/TRAIT_STANDARDS.md
    - CBConfig Standard: standards/json/CBCONFIG_STANDARD.md
  - RealmForge:
    - Overview: realm-forge/README.md
    - Implementation Order: realm-forge/IMPLEMENTATION_ORDER.md
  - Workflows:
    - Material Workflow: MATERIAL_WORKFLOW.md
    - Godot Generator Usage: GODOT_GENERATOR_USAGE.md
