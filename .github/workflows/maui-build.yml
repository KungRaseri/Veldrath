name: MAUI Build and Test

# RealmForge MAUI Application - Multi-Platform Build
# Supported Platforms:
#   ✅ Windows (net9.0-windows10.0.19041.0)
#   ✅ Android (net9.0-android)
#   ⏳ iOS/macOS - Not yet configured (requires macOS runner)
#   ❌ Linux - Not supported by MAUI (use Blazor WebAssembly for web/Linux)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'RealmForge/**'
      - 'RealmForge.Tests/**'
      - '.github/workflows/maui-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'RealmForge/**'
      - 'RealmForge.Tests/**'
      - '.github/workflows/maui-build.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: 'Release'

jobs:
  build-and-test-maui:
    name: Build and Test RealmForge (MAUI)
    runs-on: windows-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    permissions:
      checks: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install .NET MAUI workloads
      run: |
        Write-Output "Installing MAUI workloads..."
        dotnet workload install maui --source https://api.nuget.org/v3/index.json
        
        Write-Output "Verifying installed workloads..."
        dotnet workload list
      shell: pwsh
      
    - name: Restore RealmForge solution
      run: |
        Write-Output "Restoring RealmForge.sln..."
        dotnet restore RealmForge.sln
      shell: pwsh
      
    - name: Generate version
      id: version
      run: |
        $version = Get-Date -Format "yyyy.MM.dd.HHmm"
        Write-Output "version=$version" >> $env:GITHUB_OUTPUT
        Write-Output "VERSION=$version" >> $env:GITHUB_ENV
        Write-Output "Generated version: $version"
      shell: pwsh
      
    - name: Build RealmForge solution (Windows target)
      run: |
        Write-Output "Building RealmForge.sln for Windows..."
        # Build engine libraries first (net9.0)
        dotnet build RealmEngine.Shared/RealmEngine.Shared.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmEngine.Core/RealmEngine.Core.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmEngine.Data/RealmEngine.Data.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        
        # Build MAUI projects for Windows target
        dotnet build RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --no-restore --framework net9.0-windows10.0.19041.0
        dotnet build RealmForge.Tests/RealmForge.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
      shell: pwsh
      
    - name: Run RealmForge.Tests
      run: |
        Write-Output "Running RealmForge tests..."
        dotnet test RealmForge.Tests/RealmForge.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=realmforge-tests.trx" --results-directory ./TestResults/RealmForge
      shell: pwsh
      continue-on-error: true
      
    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always()
      with:
        files: |
          TestResults/RealmForge/*.trx
        check_name: RealmForge Test Results
    
    - name: Package RealmForge (Windows)
      if: success()
      run: |
        Write-Output "Packaging RealmForge for Windows..."
        dotnet publish RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --framework net9.0-windows10.0.19041.0 --output ./publish/RealmForge-Windows --no-build
        
        # Create archive
        $version = "${{ env.VERSION }}"
        $archiveName = "RealmForge-Windows-$version.zip"
        Compress-Archive -Path "./publish/RealmForge-Windows/*" -DestinationPath $archiveName -Force
        
        $archiveSize = (Get-Item $archiveName).Length / 1MB
        Write-Output "Archive created: $archiveName ($([math]::Round($archiveSize, 2)) MB)"
        
        Write-Output "archive-name=$archiveName" >> $env:GITHUB_OUTPUT
      shell: pwsh
      id: package
      
    - name: Upload RealmForge artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: realmforge-windows
        path: ${{ steps.package.outputs.archive-name }}
        retention-days: 30

  build-android:
    name: Build RealmForge (Android)
    runs-on: windows-latest
    needs: build-and-test-maui
    
    permissions:
      checks: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install .NET MAUI workloads
      run: |
        Write-Output "Installing MAUI workloads..."
        dotnet workload install maui --source https://api.nuget.org/v3/index.json
        
        Write-Output "Verifying installed workloads..."
        dotnet workload list
      shell: pwsh
      
    - name: Restore dependencies
      run: |
        Write-Output "Restoring RealmForge.sln..."
        dotnet restore RealmForge.sln
      shell: pwsh
      
    - name: Build RealmEngine libraries
      run: |
        Write-Output "Building RealmEngine libraries..."
        dotnet build RealmEngine.Shared/RealmEngine.Shared.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmEngine.Core/RealmEngine.Core.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmEngine.Data/RealmEngine.Data.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
      shell: pwsh
      
    - name: Build RealmForge (Android)
      run: |
        Write-Output "Building RealmForge for Android..."
        dotnet build RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --no-restore --framework net9.0-android
      shell: pwsh
      
    - name: Package RealmForge (Android)
      if: success()
      run: |
        Write-Output "Packaging RealmForge for Android..."
        dotnet publish RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --framework net9.0-android --output ./publish/RealmForge-Android
        
        # Create archive
        $version = "${{ needs.build-and-test-maui.outputs.version }}"
        $archiveName = "RealmForge-Android-$version.zip"
        Compress-Archive -Path "./publish/RealmForge-Android/*" -DestinationPath $archiveName -Force
        
        $archiveSize = (Get-Item $archiveName).Length / 1MB
        Write-Output "Archive created: $archiveName ($([math]::Round($archiveSize, 2)) MB)"
        
        Write-Output "archive-name=$archiveName" >> $env:GITHUB_OUTPUT
      shell: pwsh
      id: package
      
    - name: Upload RealmForge Android artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: realmforge-android
        path: ${{ steps.package.outputs.archive-name }}
        retention-days: 30

  create-release:
    name: Create RealmForge Release
    needs: [build-and-test-maui, build-android]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: write
    
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: realmforge-windows
        
    - name: Download Android artifact
      uses: actions/download-artifact@v4
      with:
        name: realmforge-android
        
    - name: Create Release Tag
      id: create_tag
      run: |
        VERSION="${{ needs.build-and-test-maui.outputs.version }}"
        TAG_NAME="realmforge-v${VERSION}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
        echo "Release version: ${VERSION}"
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.create_tag.outputs.tag_name }}
        name: RealmForge ${{ steps.create_tag.outputs.version }}
        body: |
          # RealmForge ${{ steps.create_tag.outputs.version }}
          
          JSON Data Editor for RealmEngine
          
          ## Platforms
          - ✅ Windows (net9.0-windows)
          - ✅ Android (net9.0-android)
          
          ## What's Included
          - RealmForge MAUI application
          - All RealmEngine dependencies
          - JSON editing capabilities
          
          **Note**: This is an early development build of the RealmForge tool.
        files: |
          RealmForge-Windows-*.zip
          RealmForge-Android-*.zip
        draft: false
        prerelease: true
        token: ${{ secrets.GITHUB_TOKEN }}
