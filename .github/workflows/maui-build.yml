name: MAUI Build and Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'RealmForge/**'
      - 'RealmForge.Tests/**'
      - '.github/workflows/maui-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'RealmForge/**'
      - 'RealmForge.Tests/**'
      - '.github/workflows/maui-build.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: 'Release'

jobs:
  build-and-test-maui:
    name: Build and Test RealmForge (MAUI)
    runs-on: windows-latest
    
    permissions:
      checks: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install .NET MAUI workloads
      run: |
        Write-Output "Installing MAUI workloads..."
        dotnet workload install maui --source https://api.nuget.org/v3/index.json
        
        Write-Output "Verifying installed workloads..."
        dotnet workload list
      shell: pwsh
      
    - name: Restore RealmForge solution
      run: |
        Write-Output "Restoring RealmForge.sln..."
        dotnet restore RealmForge.sln
      shell: pwsh
      
    - name: Build RealmForge solution (Windows target)
      run: |
        Write-Output "Building RealmForge.sln for Windows..."
        dotnet build RealmForge.sln --configuration ${{ env.CONFIGURATION }} --no-restore --framework net9.0-windows10.0.19041.0 /p:TargetFramework=net9.0-windows10.0.19041.0
      shell: pwsh
      
    - name: Run RealmForge.Tests
      run: |
        Write-Output "Running RealmForge tests..."
        dotnet test RealmForge.Tests/RealmForge.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=realmforge-tests.trx" --results-directory ./TestResults/RealmForge
      shell: pwsh
      continue-on-error: true
      
    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always()
      with:
        files: |
          TestResults/RealmForge/*.trx
        check_name: RealmForge Test Results
    
    - name: Package RealmForge (Windows)
      if: success()
      run: |
        Write-Output "Packaging RealmForge for Windows..."
        dotnet publish RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --framework net9.0-windows10.0.19041.0 --output ./publish/RealmForge-Windows --no-build
        
        # Create archive
        $version = Get-Date -Format "yyyy.MM.dd.HHmm"
        $archiveName = "RealmForge-Windows-$version.zip"
        Compress-Archive -Path "./publish/RealmForge-Windows/*" -DestinationPath $archiveName -Force
        
        $archiveSize = (Get-Item $archiveName).Length / 1MB
        Write-Output "Archive created: $archiveName ($([math]::Round($archiveSize, 2)) MB)"
        
        Write-Output "archive-name=$archiveName" >> $env:GITHUB_OUTPUT
      shell: pwsh
      id: package
      
    - name: Upload RealmForge artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: realmforge-windows
        path: ${{ steps.package.outputs.archive-name }}
        retention-days: 30

  build-android:
    name: Build RealmForge (Android)
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install .NET MAUI workloads
      run: |
        Write-Output "Installing MAUI workloads..."
        dotnet workload install maui --source https://api.nuget.org/v3/index.json
        
        Write-Output "Verifying installed workloads..."
        dotnet workload list
      shell: pwsh
      
    - name: Restore dependencies
      run: |
        dotnet restore RealmForge.sln
      shell: pwsh
      
    - name: Build RealmForge (Android)
      run: |
        Write-Output "Building RealmForge for Android..."
        dotnet build RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --framework net9.0-android
      shell: pwsh
      continue-on-error: true
