name: CI - Client (RealmUnbound.Client)

concurrency:
  group: ci-client-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, development ]
    paths:
      - 'RealmUnbound.Client/**'
      - 'RealmUnbound.Client.Tests/**'
      - 'RealmEngine.Core/**'
      - 'RealmEngine.Shared/**'
      - 'RealmEngine.Data/**'
      - 'versions/client.props'
      - 'versions/engine.props'
      - 'Directory.Build.props'
      - '.github/workflows/ci-client.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'RealmUnbound.Client/**'
      - 'RealmUnbound.Client.Tests/**'
      - 'RealmEngine.Core/**'
      - 'RealmEngine.Shared/**'
      - 'RealmEngine.Data/**'
      - 'versions/client.props'
      - 'versions/engine.props'
      - 'Directory.Build.props'
      - '.github/workflows/ci-client.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: 'Release'
  PROPS_FILE: 'versions/client.props'

jobs:
  build-and-test:
    name: Build and Test Client
    runs-on: windows-latest

    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore RealmUnbound.Client.Tests/RealmUnbound.Client.Tests.csproj
      shell: pwsh

    - name: Build
      run: dotnet build RealmUnbound.Client.Tests/RealmUnbound.Client.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
      shell: pwsh

    - name: Test - RealmUnbound.Client.Tests
      run: |
        dotnet test RealmUnbound.Client.Tests/RealmUnbound.Client.Tests.csproj `
          --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal `
          --collect "XPlat Code Coverage" --settings coverage.runsettings `
          --logger "trx;LogFileName=client-tests.trx" `
          --results-directory ./TestResults
      shell: pwsh

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool
      shell: pwsh

    - name: Generate coverage report
      run: reportgenerator "-reports:./TestResults/*/coverage.cobertura.xml" "-targetdir:./CoverageReport" "-reporttypes:Html;Cobertura;MarkdownSummaryGithub"
      shell: pwsh

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./CoverageReport/Cobertura.xml
        flags: client
        name: client-coverage
        fail_ci_if_error: false

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-client
        path: CoverageReport/
        retention-days: 14

    - name: Add coverage summary to PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: CoverageReport/SummaryGithub.md

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always()
      with:
        files: TestResults/*.trx
        check_name: Client Test Results

  package:
    name: Package Client Artifacts
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.version-no-hash }}

    permissions:
      contents: write  # needed to create the release tag
      actions: write   # needed to dispatch the release workflow

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # Game asset binaries are stored as a GitHub Release in the private
    # KungRaseri/RealmEngine-Assets repo (not committed here due to size/licensing).
    # ASSETS_TOKEN must be a fine-grained PAT with Contents:Read on that repo,
    # added as a repository secret in KungRaseri/RealmEngine settings.
    - name: Download game assets
      env:
        GH_TOKEN: ${{ secrets.ASSETS_TOKEN }}
      run: |
        $destPath = "RealmUnbound.Assets/GameAssets"
        New-Item -ItemType Directory -Force -Path $destPath | Out-Null
        gh release download --repo KungRaseri/RealmUnbound-Assets --pattern "GameAssets-*.zip" --dir ./assets-tmp
        $zipFile = Get-ChildItem ./assets-tmp/GameAssets-*.zip | Select-Object -First 1
        Expand-Archive -Path $zipFile.FullName -DestinationPath $destPath -Force
        $fileCount = (Get-ChildItem $destPath -Recurse -File).Count
        Write-Output "Extracted $fileCount asset files to $destPath"
      shell: pwsh

    - name: Generate version
      id: version
      run: |
        $version = .\scripts\generate-version.ps1 -OutputFormat "string" -PropsFile "${{ env.PROPS_FILE }}"
        $versionNoHash = $version -replace '-[^-]+$', ''
        Write-Output "version=$version" >> $env:GITHUB_OUTPUT
        Write-Output "version-no-hash=$versionNoHash" >> $env:GITHUB_OUTPUT
        Write-Output "Client version: $version"
      shell: pwsh

    - name: Publish (Windows x64)
      run: |
        $version = "${{ steps.version.outputs.version-no-hash }}"
        dotnet restore RealmUnbound.Client/RealmUnbound.Client.csproj
        dotnet publish RealmUnbound.Client/RealmUnbound.Client.csproj `
          --configuration ${{ env.CONFIGURATION }} `
          --runtime win-x64 --self-contained true `
          --output ./publish/RealmUnbound-Client-Windows `
          /p:Version=$version /p:AssemblyVersion=$version /p:FileVersion=$version.0
        Compress-Archive -Path "./publish/RealmUnbound-Client-Windows/*" `
          -DestinationPath "RealmUnbound-Client-Windows-$version.zip" -Force
        Write-Output "Created RealmUnbound-Client-Windows-$version.zip"
      shell: pwsh

    - name: Publish (Linux x64)
      run: |
        $version = "${{ steps.version.outputs.version-no-hash }}"
        dotnet publish RealmUnbound.Client/RealmUnbound.Client.csproj `
          --configuration ${{ env.CONFIGURATION }} `
          --runtime linux-x64 --self-contained true `
          --output ./publish/RealmUnbound-Client-Linux `
          /p:Version=$version /p:AssemblyVersion=$version /p:FileVersion=$version.0
        Compress-Archive -Path "./publish/RealmUnbound-Client-Linux/*" `
          -DestinationPath "RealmUnbound-Client-Linux-$version.zip" -Force
        Write-Output "Created RealmUnbound-Client-Linux-$version.zip"
      shell: pwsh

    - name: Publish (macOS x64)
      run: |
        $version = "${{ steps.version.outputs.version-no-hash }}"
        dotnet publish RealmUnbound.Client/RealmUnbound.Client.csproj `
          --configuration ${{ env.CONFIGURATION }} `
          --runtime osx-x64 --self-contained true `
          --output ./publish/RealmUnbound-Client-macOS-x64 `
          /p:Version=$version /p:AssemblyVersion=$version /p:FileVersion=$version.0
        Compress-Archive -Path "./publish/RealmUnbound-Client-macOS-x64/*" `
          -DestinationPath "RealmUnbound-Client-macOS-x64-$version.zip" -Force
        Write-Output "Created RealmUnbound-Client-macOS-x64-$version.zip"
      shell: pwsh

    - name: Publish (macOS ARM64)
      run: |
        $version = "${{ steps.version.outputs.version-no-hash }}"
        dotnet publish RealmUnbound.Client/RealmUnbound.Client.csproj `
          --configuration ${{ env.CONFIGURATION }} `
          --runtime osx-arm64 --self-contained true `
          --output ./publish/RealmUnbound-Client-macOS-arm64 `
          /p:Version=$version /p:AssemblyVersion=$version /p:FileVersion=$version.0
        Compress-Archive -Path "./publish/RealmUnbound-Client-macOS-arm64/*" `
          -DestinationPath "RealmUnbound-Client-macOS-arm64-$version.zip" -Force
        Write-Output "Created RealmUnbound-Client-macOS-arm64-$version.zip"
      shell: pwsh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: client-release-artifacts
        path: RealmUnbound-Client-*.zip
        retention-days: 7

    - name: Create release tag
      run: |
        $version = "${{ steps.version.outputs.version-no-hash }}"
        $tag = "client/v$version"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag $tag
        git push origin $tag
        Write-Output "Created tag: $tag"
      shell: pwsh

    - name: Trigger release workflow
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "client/v${{ steps.version.outputs.version-no-hash }}"
        gh workflow run release.yml --ref main --field tag=$tag
        Write-Output "Triggered release workflow for $tag"
      shell: pwsh
