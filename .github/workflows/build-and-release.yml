name: Build and Release

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: 'Release'

jobs:
  # ========================================
  # STAGE 1: Build and Test RealmEngine
  # ========================================
  build-realmengine:
    name: Build and Test RealmEngine
    runs-on: windows-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    permissions:
      checks: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history for version generation
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Generate version
      id: version
      run: |
        $version = .\scripts\generate-version.ps1 -OutputFormat "string"
        Write-Output "VERSION=$version" >> $env:GITHUB_ENV
        Write-Output "version=$version" >> $env:GITHUB_OUTPUT
        Write-Output "Generated version: $version"
      shell: pwsh
        
    - name: Restore dependencies
      run: dotnet restore RealmEngine.sln
      
    - name: Build solution
      run: dotnet build RealmEngine.sln --configuration ${{ env.CONFIGURATION }} --no-restore
      
    - name: Run RealmEngine.Shared.Tests
      run: dotnet test RealmEngine.Shared.Tests/RealmEngine.Shared.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=shared-tests.trx" --results-directory ./TestResults/RealmEngine
      continue-on-error: false
      
    - name: Run RealmEngine.Core.Tests
      run: dotnet test RealmEngine.Core.Tests/RealmEngine.Core.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=core-tests.trx" --results-directory ./TestResults/RealmEngine
      continue-on-error: false
      
    - name: Run RealmEngine.Data.Tests
      run: dotnet test RealmEngine.Data.Tests/RealmEngine.Data.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=data-tests.trx" --results-directory ./TestResults/RealmEngine
      continue-on-error: false
      
    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always()
      with:
        files: |
          TestResults/RealmEngine/*.trx
        check_name: RealmEngine Test Results
    
    - name: Upload build artifacts for RealmForge
      uses: actions/upload-artifact@v4
      with:
        name: realmengine-build
        path: |
          RealmEngine.Shared/bin/${{ env.CONFIGURATION }}/net9.0/
          RealmEngine.Core/bin/${{ env.CONFIGURATION }}/net9.0/
          RealmEngine.Data/bin/${{ env.CONFIGURATION }}/net9.0/
        retention-days: 1

  # ========================================
  # STAGE 2: Build and Test RealmForge (MAUI)
  # ========================================
  build-realmforge:
    name: Build and Test RealmForge
    runs-on: windows-latest
    needs: build-realmengine
    
    permissions:
      checks: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install .NET MAUI workloads
      run: |
        Write-Output "Installing MAUI workloads..."
        dotnet workload install maui --source https://api.nuget.org/v3/index.json
        
        Write-Output "Verifying installed workloads..."
        dotnet workload list
      shell: pwsh
      
    - name: Restore RealmForge solution
      run: |
        Write-Output "Restoring RealmForge.sln..."
        dotnet restore RealmForge.sln
      shell: pwsh
      
    - name: Build RealmForge solution (Windows)
      run: |
        Write-Output "Building RealmForge for Windows..."
        # Build engine libraries first (net9.0)
        dotnet build RealmEngine.Shared/RealmEngine.Shared.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmEngine.Core/RealmEngine.Core.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmEngine.Data/RealmEngine.Data.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        
        # Build MAUI projects for Windows target
        dotnet build RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --no-restore --framework net9.0-windows10.0.19041.0
        dotnet build RealmForge.Tests/RealmForge.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
      shell: pwsh
      
    - name: Run RealmForge.Tests
      run: |
        Write-Output "Running RealmForge tests..."
        dotnet test RealmForge.Tests/RealmForge.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=realmforge-tests.trx" --results-directory ./TestResults/RealmForge
      shell: pwsh
      continue-on-error: true
      
    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always()
      with:
        files: |
          TestResults/RealmForge/*.trx
        check_name: RealmForge Test Results
    
    - name: Upload RealmForge build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: realmforge-windows-build
        path: |
          RealmForge/bin/${{ env.CONFIGURATION }}/net9.0-windows10.0.19041.0/
        retention-days: 1

  build-realmforge-android:
    name: Build RealmForge (Android)
    runs-on: windows-latest
    needs: build-realmengine
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install .NET MAUI workloads
      run: |
        dotnet workload install maui --source https://api.nuget.org/v3/index.json
      shell: pwsh
      
    - name: Restore and Build for Android
      run: |
        dotnet restore RealmForge.sln
        dotnet build RealmEngine.Shared/RealmEngine.Shared.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmEngine.Core/RealmEngine.Core.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmEngine.Data/RealmEngine.Data.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --no-restore --framework net9.0-android
      shell: pwsh
      
    - name: Upload RealmForge Android build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: realmforge-android-build
        path: |
          RealmForge/bin/${{ env.CONFIGURATION }}/net9.0-android/
        retention-days: 1

  # ========================================
  # STAGE 3: Package and Publish (Parallel)
  # ========================================
  package-realmengine:
    name: Package RealmEngine
    needs: [build-realmengine, build-realmforge]
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Create Libraries package (RealmEngine + Data)
      run: |
        $version = "${{ needs.build-realmengine.outputs.version }}"
        
        # Restore and build
        dotnet restore RealmEngine.sln
        dotnet build RealmEngine.sln --configuration ${{ env.CONFIGURATION }} --no-restore
        
        # Create package directory
        New-Item -ItemType Directory -Force -Path package-libraries/Libraries
        New-Item -ItemType Directory -Force -Path package-libraries/Data
        
        # Copy DLLs
        Copy-Item -Path "RealmEngine.Shared/bin/${{ env.CONFIGURATION }}/net9.0/*" -Destination "package-libraries/Libraries/" -Recurse
        Copy-Item -Path "RealmEngine.Core/bin/${{ env.CONFIGURATION }}/net9.0/*" -Destination "package-libraries/Libraries/" -Recurse
        Copy-Item -Path "RealmEngine.Data/bin/${{ env.CONFIGURATION }}/net9.0/*" -Destination "package-libraries/Libraries/" -Recurse
        
        # Copy JSON data
        Copy-Item -Path "RealmEngine.Data/Json" -Destination "package-libraries/Data/" -Recurse
        
        # Create archive
        $archiveName = "RealmEngine-Libraries-$version.zip"
        Compress-Archive -Path "package-libraries/*" -DestinationPath $archiveName -Force
        
        Write-Output "Created $archiveName"
      shell: pwsh
      
    - name: Create Data-only package
      run: |
        $version = "${{ needs.build-realmengine.outputs.version }}"
        
        # Create package directory
        New-Item -ItemType Directory -Force -Path package-data/Json
        
        # Copy JSON data
        Copy-Item -Path "RealmEngine.Data/Json/*" -Destination "package-data/Json/" -Recurse
        
        # Create README
        $readmeContent = "# RealmEngine JSON Data Package`nVersion: $version`n`nThis package contains all JSON game data files for RealmEngine.`n`n## Contents`n- Abilities, Items, Enemies, NPCs, Quests`n- All game data following JSON v4.0+ standards`n`n## Usage`nExtract to your game's Data directory or use with RealmForge editor."
        Set-Content -Path "package-data/README.md" -Value $readmeContent -Encoding UTF8
        
        # Create archive
        $archiveName = "RealmEngine-Data-$version.zip"
        Compress-Archive -Path "package-data/*" -DestinationPath $archiveName -Force
        
        Write-Output "Created $archiveName"
      shell: pwsh
      
    - name: Upload Libraries package
      uses: actions/upload-artifact@v4
      with:
        name: package-libraries
        path: RealmEngine-Libraries-*.zip
        retention-days: 30
        
    - name: Upload Data package
      uses: actions/upload-artifact@v4
      with:
        name: package-data
        path: RealmEngine-Data-*.zip
        retention-days: 30

  package-realmforge:
    name: Package RealmForge
    needs: [build-realmengine, build-realmforge, build-realmforge-android]
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install MAUI workloads
      run: dotnet workload install maui --source https://api.nuget.org/v3/index.json
      shell: pwsh
      
    - name: Restore and build
      run: |
        dotnet restore RealmForge.sln
        dotnet build RealmEngine.Shared/RealmEngine.Shared.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmEngine.Core/RealmEngine.Core.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmEngine.Data/RealmEngine.Data.csproj --configuration ${{ env.CONFIGURATION }} --no-restore
        dotnet build RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --no-restore --framework net9.0-windows10.0.19041.0
        dotnet build RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --no-restore --framework net9.0-android
      shell: pwsh
      
    - name: Package RealmForge (Windows)
      run: |
        $version = "${{ needs.build-realmengine.outputs.version }}"
        
        dotnet publish RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --framework net9.0-windows10.0.19041.0 --output ./publish/RealmForge-Windows
        
        # Copy JSON data
        New-Item -ItemType Directory -Force -Path ./publish/RealmForge-Windows/Data
        Copy-Item -Path "RealmEngine.Data/Json" -Destination "./publish/RealmForge-Windows/Data/" -Recurse
        
        $archiveName = "RealmForge-Windows-$version.zip"
        Compress-Archive -Path "./publish/RealmForge-Windows/*" -DestinationPath $archiveName -Force
        Write-Output "Created $archiveName"
      shell: pwsh
      
    - name: Package RealmForge (Android)
      run: |
        $version = "${{ needs.build-realmengine.outputs.version }}"
        
        dotnet publish RealmForge/RealmForge.csproj --configuration ${{ env.CONFIGURATION }} --framework net9.0-android --output ./publish/RealmForge-Android
        
        # Copy JSON data
        New-Item -ItemType Directory -Force -Path ./publish/RealmForge-Android/Data
        Copy-Item -Path "RealmEngine.Data/Json" -Destination "./publish/RealmForge-Android/Data/" -Recurse
        
        $archiveName = "RealmForge-Android-$version.zip"
        Compress-Archive -Path "./publish/RealmForge-Android/*" -DestinationPath $archiveName -Force
        Write-Output "Created $archiveName"
      shell: pwsh
      
    - name: Upload RealmForge Windows package
      uses: actions/upload-artifact@v4
      with:
        name: package-realmforge-windows
        path: RealmForge-Windows-*.zip
        retention-days: 30
        
    - name: Upload RealmForge Android package
      uses: actions/upload-artifact@v4
      with:
        name: package-realmforge-android
        path: RealmForge-Android-*.zip
        retention-days: 30

  package-full:
    name: Create Full Package
    needs: [build-realmengine, build-realmforge]
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install MAUI workloads
      run: dotnet workload install maui --source https://api.nuget.org/v3/index.json
      shell: pwsh
      
    - name: Build and package full solution
      run: |
        $version = "${{ needs.build-realmengine.outputs.version }}"
        
        # Use the existing build script
        cd scripts
        .\build-game-package.ps1 -Configuration ${{ env.CONFIGURATION }}
        cd ..
        
        # Create full archive
        $archiveName = "RealmEngine-Full-$version.zip"
        Compress-Archive -Path "package/*" -DestinationPath $archiveName -Force
        
        Write-Output "Created $archiveName"
      shell: pwsh
      
    - name: Upload Full package
      uses: actions/upload-artifact@v4
      with:
        name: package-full
        path: RealmEngine-Full-*.zip
        retention-days: 30
        
    - name: Upload package manifest
      uses: actions/upload-artifact@v4
      with:
        name: package-manifest
        path: package/package-manifest.json
        retention-days: 30

  publish-nuget:
    name: Publish NuGet Packages
    needs: build-realmengine
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    
    permissions:
      packages: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore and build
      run: |
        dotnet restore RealmEngine.sln
        dotnet build RealmEngine.sln --configuration ${{ env.CONFIGURATION }} --no-restore
      
    - name: Pack RealmEngine packages
      run: |
        $version = "${{ needs.build-realmengine.outputs.version }}"
        dotnet pack RealmEngine.Core/RealmEngine.Core.csproj --configuration ${{ env.CONFIGURATION }} --no-build -p:PackageVersion=$version -p:RepositoryUrl=${{ github.server_url }}/${{ github.repository }} -p:RepositoryCommit=${{ github.sha }}
        dotnet pack RealmEngine.Shared/RealmEngine.Shared.csproj --configuration ${{ env.CONFIGURATION }} --no-build -p:PackageVersion=$version -p:RepositoryUrl=${{ github.server_url }}/${{ github.repository }} -p:RepositoryCommit=${{ github.sha }}
        dotnet pack RealmEngine.Data/RealmEngine.Data.csproj --configuration ${{ env.CONFIGURATION }} --no-build -p:PackageVersion=$version -p:RepositoryUrl=${{ github.server_url }}/${{ github.repository }} -p:RepositoryCommit=${{ github.sha }}
      shell: pwsh
      
    - name: Publish to GitHub Packages
      run: |
        dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
        dotnet nuget push "**/*.nupkg" --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
      shell: pwsh

  # ========================================
  # STAGE 4: Tag and Notify
  # ========================================
  auto-tag:
    name: Create Version Tag
    needs: [build-realmengine, build-realmforge, package-realmengine, package-realmforge, package-full]
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        
    - name: Create and push tag
      run: |
        $version = "${{ needs.build-realmengine.outputs.version }}"
        $tagName = "v$version"
        
        # Check if tag already exists
        $tagExists = git tag -l "$tagName"
        if ($tagExists) {
          Write-Output "Tag $tagName already exists, skipping"
          exit 0
        }
        
        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Create annotated tag
        git tag -a "$tagName" -m "Release version $version"
        git push origin "$tagName"
        
        Write-Output "✓ Created and pushed tag: $tagName"
      shell: pwsh

  notify:
    name: Build Summary
    needs: [build-realmengine, build-realmforge, build-realmforge-android, package-realmengine, package-realmforge, package-full, publish-nuget]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Generate Summary
      run: |
        echo "## 🎮 RealmEngine Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version**: ${{ needs.build-realmengine.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Status" >> $GITHUB_STEP_SUMMARY
        echo "- **RealmEngine**: ${{ needs.build-realmengine.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **RealmForge (Windows)**: ${{ needs.build-realmforge.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **RealmForge (Android)**: ${{ needs.build-realmforge-android.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Packages Created" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Full Package** (RealmEngine + RealmForge + Data)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Libraries** (RealmEngine + Data)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **RealmForge Windows** (Modding Tool + Data)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **RealmForge Android** (Modding Tool + Data)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Data Only** (JSON Data)" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published" >> $GITHUB_STEP_SUMMARY
          echo "- NuGet Packages: ${{ needs.publish-nuget.result }}" >> $GITHUB_STEP_SUMMARY
        fi
