name: CI - Community Portal (RealmFoundry)

concurrency:
  group: ci-foundry-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, development ]
    paths:
      - 'RealmFoundry/**'
      - 'RealmFoundry.Tests/**'
      - 'Veldrath.Contracts/**'
      - 'versions/foundry.props'
      - 'Directory.Build.props'
      - '.github/workflows/ci-foundry.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'RealmFoundry/**'
      - 'RealmFoundry.Tests/**'
      - 'Veldrath.Contracts/**'
      - 'versions/foundry.props'
      - 'Directory.Build.props'
      - '.github/workflows/ci-foundry.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: 'Release'
  PROPS_FILE: 'versions/foundry.props'

jobs:
  build-and-test:
    name: Build and Test RealmFoundry
    runs-on: windows-latest

    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore RealmFoundry.slnx
      shell: pwsh

    - name: Build RealmFoundry
      run: dotnet build RealmFoundry.slnx --configuration ${{ env.CONFIGURATION }} --no-restore
      shell: pwsh

    - name: Test - RealmFoundry.Tests
      run: |
        dotnet test RealmFoundry.Tests/RealmFoundry.Tests.csproj `
          --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal `
          --collect "XPlat Code Coverage" --settings coverage.runsettings `
          --logger "trx;LogFileName=realmfoundry-tests.trx" `
          --results-directory ./TestResults
      shell: pwsh

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool
      shell: pwsh

    - name: Generate coverage report
      run: reportgenerator "-reports:./TestResults/*/coverage.cobertura.xml" "-targetdir:./CoverageReport" "-reporttypes:Html;Cobertura;MarkdownSummaryGithub"
      shell: pwsh

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./CoverageReport/Cobertura.xml
        flags: foundry
        name: foundry-coverage
        fail_ci_if_error: false

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-foundry
        path: CoverageReport/
        retention-days: 14

    - name: Add coverage summary to PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: CoverageReport/SummaryGithub.md

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always()
      with:
        files: TestResults/*.trx
        check_name: RealmFoundry Test Results

  package:
    name: Package Foundry Artifacts
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.version-no-hash }}

    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Generate version
      id: version
      run: |
        $version = .\scripts\generate-version.ps1 -OutputFormat "string" -PropsFile "${{ env.PROPS_FILE }}"
        $versionNoHash = $version -replace '-[^-]+$', ''
        Write-Output "version=$version" >> $env:GITHUB_OUTPUT
        Write-Output "version-no-hash=$versionNoHash" >> $env:GITHUB_OUTPUT
        Write-Output "Foundry version: $version"
      shell: pwsh

    - name: Restore and publish
      run: |
        $version = "${{ steps.version.outputs.version-no-hash }}"
        dotnet restore RealmFoundry.slnx
        dotnet publish RealmFoundry/RealmFoundry.csproj `
          --configuration ${{ env.CONFIGURATION }} `
          --output ./publish/RealmFoundry `
          /p:Version=$version /p:AssemblyVersion=$version /p:FileVersion=$version.0

        Compress-Archive -Path "./publish/RealmFoundry/*" `
          -DestinationPath "RealmFoundry-$version.zip" -Force
        Write-Output "Created RealmFoundry-$version.zip"
      shell: pwsh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: foundry-release-artifacts
        path: RealmFoundry-*.zip
        retention-days: 7

    - name: Create release tag
      run: |
        $version = "${{ steps.version.outputs.version-no-hash }}"
        $tag = "foundry/v$version"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag $tag ${{ github.sha }}
        git push origin $tag
        Write-Output "Created tag: $tag"
      shell: pwsh

    - name: Trigger release workflow
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "foundry/v${{ steps.version.outputs.version-no-hash }}"
        gh workflow run release.yml --ref main --field tag=$tag
        Write-Output "Triggered release workflow for $tag"
      shell: pwsh
