name: Deploy Documentation

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'docfx.json'
      - 'toc.yml'
      - '.github/workflows/docs.yml'
      - 'RealmEngine.Core/**'
      - 'RealmEngine.Shared/**'
      - 'RealmEngine.Data/**'
      - 'RealmForge/**'
      - 'RealmUnbound.Client/**'
      - 'RealmUnbound.Server/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore Realm.Full.slnx

      - name: Install DocFX
        run: dotnet tool install --global docfx

      - name: Generate API metadata
        run: docfx metadata docfx.json

      - name: Create API landing page
        run: |
          cat > api/index.md << 'EOF'
          # API Reference

          Browse the API documentation using the navigation on the left.

          | Project | Description |
          |---------|-------------|
          | **RealmEngine.Core** | Game logic — combat, crafting, inventory, quests, spells |
          | **RealmEngine.Shared** | Shared models, domain entities, interfaces |
          | **RealmEngine.Data** | JSON data loading, EF Core persistence, repositories |
          | **RealmForge** | Avalonia UI JSON game data editor |
          | **RealmUnbound.Client** | Avalonia desktop client with ReactiveUI |
          | **RealmUnbound.Server** | ASP.NET Core game server with SignalR |
          EOF

      - name: Apply custom API TOC
        run: cp docs/api-toc.template.yml api/toc.yml

      - name: Build documentation
        run: docfx build docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
