# Triggered by component release tags (e.g. engine/v1.2.3) created automatically
# by the package job in each CI workflow after a successful main-branch build.
# Can also be triggered manually via workflow_dispatch with an existing tag.
#
# Flow:
#   1. Detect which component the tag belongs to
#   2. Find the CI run that built artifacts for that commit (polls up to 5 min)
#   3. Download the pre-built artifacts from that CI run
#   4. Generate a scoped changelog (commits since the previous tag for this component)
#   5. Build component-specific release notes
#   6. Publish a GitHub Release with the artifacts and notes
name: Release

on:
  push:
    tags:
      - 'engine/v*'
      - 'tooling/v*'
      - 'server/v*'
      - 'client/v*'
      - 'discord/v*'
      - 'foundry/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. engine/v1.2.3)'
        required: true

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ── Detect which component this tag is for ────────────────────────────────
    - name: Detect component and version
      id: meta
      run: |
        # Support both tag-push and workflow_dispatch triggers
        TAG="${{ github.event.inputs.tag || github.ref_name }}"
        if [[ "$TAG" == engine/v* ]]; then
          COMPONENT="engine"
          WORKFLOW="ci-engine.yml"
          ARTIFACT_NAME="engine-release-artifacts"
          VERSION="${TAG#engine/v}"
        elif [[ "$TAG" == tooling/v* ]]; then
          COMPONENT="tooling"
          WORKFLOW="ci-tooling.yml"
          ARTIFACT_NAME="tooling-release-artifacts"
          VERSION="${TAG#tooling/v}"
        elif [[ "$TAG" == server/v* ]]; then
          COMPONENT="server"
          WORKFLOW="ci-server.yml"
          ARTIFACT_NAME="server-release-artifacts"
          VERSION="${TAG#server/v}"
        elif [[ "$TAG" == client/v* ]]; then
          COMPONENT="client"
          WORKFLOW="ci-client.yml"
          ARTIFACT_NAME="client-release-artifacts"
          VERSION="${TAG#client/v}"
        elif [[ "$TAG" == discord/v* ]]; then
          COMPONENT="discord"
          WORKFLOW="ci-discord.yml"
          ARTIFACT_NAME="discord-release-artifacts"
          VERSION="${TAG#discord/v}"
        elif [[ "$TAG" == foundry/v* ]]; then
          COMPONENT="foundry"
          WORKFLOW="ci-foundry.yml"
          ARTIFACT_NAME="foundry-release-artifacts"
          VERSION="${TAG#foundry/v}"
        else
          echo "Unknown tag prefix: $TAG"
          exit 1
        fi
        echo "component=$COMPONENT" >> $GITHUB_OUTPUT
        echo "workflow=$WORKFLOW"   >> $GITHUB_OUTPUT
        echo "artifact=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
        echo "version=$VERSION"    >> $GITHUB_OUTPUT
        echo "tag=$TAG"            >> $GITHUB_OUTPUT
        echo "Component: $COMPONENT  Version: $VERSION"

    # ── Find the CI run that built artifacts for this tag's commit ────────────
    - name: Find CI run for tagged commit
      id: ci-run
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        COMMIT_SHA=$(git rev-list -n 1 ${{ github.ref_name }})
        WORKFLOW="${{ steps.meta.outputs.workflow }}"
        echo "Looking for $WORKFLOW run on commit $COMMIT_SHA ..."

        # Poll up to 5 minutes for a completed successful run on this commit
        for i in $(seq 1 30); do
          RUN_ID=$(gh run list \
            --workflow "$WORKFLOW" \
            --json databaseId,headSha,conclusion,status \
            --jq ".[] | select(.headSha == \"$COMMIT_SHA\" and .conclusion == \"success\") | .databaseId" \
            | head -1)

          if [ -n "$RUN_ID" ]; then
            echo "Found run: $RUN_ID"
            echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Attempt $i/30: no successful run yet, waiting 10s..."
          sleep 10
        done

        echo "ERROR: No successful CI run found for commit $COMMIT_SHA within 5 minutes."
        exit 1

    # ── Download artifacts from the CI run ───────────────────────────────────
    - name: Download release artifacts
      uses: actions/download-artifact@v4
      with:
        name: ${{ steps.meta.outputs.artifact }}
        run-id: ${{ steps.ci-run.outputs.run-id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: ./artifacts

    - name: List downloaded artifacts
      run: |
        echo "Artifacts for ${{ steps.meta.outputs.component }} ${{ steps.meta.outputs.version }}:"
        find ./artifacts -type f | sort

    # ── Changelog (scoped to this component's tags) ───────────────────────────
    - name: Generate changelog
      id: changelog
      run: |
        TAG="${{ steps.meta.outputs.tag }}"
        PREFIX="${{ steps.meta.outputs.component }}/v"

        PREV_TAG=$(git tag --sort=-version:refname \
          | grep "^${PREFIX}" \
          | grep -v "^${TAG}$" \
          | head -1)

        if [ -n "$PREV_TAG" ]; then
          echo "Changelog from $PREV_TAG to $TAG"
          COMMITS=$(git log "$PREV_TAG..$TAG" --pretty=format:"- %s (%h)" --no-merges)
        else
          echo "First release — using last 20 commits"
          COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges --max-count=20)
        fi

        [ -z "$COMMITS" ] && COMMITS="- Initial release"

        # Use a unique delimiter to avoid collision with commit message content
        DELIM="EOF_$(openssl rand -hex 8)"
        echo "changelog<<$DELIM" >> $GITHUB_OUTPUT
        echo "$COMMITS"          >> $GITHUB_OUTPUT
        echo "$DELIM"            >> $GITHUB_OUTPUT

    # ── Component-specific release names and notes ────────────────────────────
    - name: Build release metadata
      id: release-meta
      env:
        # Pass changelog via env to avoid shell injection from commit messages
        CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        REPO_OWNER: ${{ github.repository_owner }}
      run: |
        COMPONENT="${{ steps.meta.outputs.component }}"
        VERSION="${{ steps.meta.outputs.version }}"
        # Lowercase for container registry references
        REPO_OWNER_LC=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')

        case "$COMPONENT" in
          engine)
            NAME="RealmEngine Libraries $VERSION"
            {
              echo "## RealmEngine Libraries $VERSION"
              echo ""
              echo "Core, Shared, and Data assemblies for consumption by any .NET application."
              echo ""
              echo "### Packages"
              echo "- \`RealmEngine-Libraries-$VERSION.zip\` — Core, Shared, and Data assemblies"
              echo ""
              echo "### Changes"
              printf '%s\n' "$CHANGELOG"
            } > release-body.md
            ;;
          tooling)
            NAME="RealmForge $VERSION"
            {
              echo "## RealmForge $VERSION"
              echo ""
              echo "Avalonia desktop content editor for managing RealmEngine game data in Postgres."
              echo ""
              echo "### Packages"
              echo "- \`RealmForge-Windows-$VERSION.zip\` — Windows desktop application (win-x64, self-contained)"
              echo ""
              echo "### Changes"
              printf '%s\n' "$CHANGELOG"
            } > release-body.md
            ;;
          server)
            NAME="RealmUnbound Server $VERSION"
            {
              echo "## RealmUnbound Server $VERSION"
              echo ""
              echo "Game server API for RealmUnbound."
              echo ""
              echo "### Docker Image"
              echo '```'
              echo "docker pull ghcr.io/$REPO_OWNER_LC/realmunbound-server:$VERSION"
              echo '```'
              echo ""
              echo "### Packages"
              echo "- \`RealmUnbound-Server-$VERSION.zip\` — ASP.NET Core server publish output (framework-dependent)"
              echo ""
              echo "### Changes"
              printf '%s\n' "$CHANGELOG"
            } > release-body.md
            ;;
          client)
            NAME="RealmUnbound Client $VERSION"
            {
              echo "## RealmUnbound Client $VERSION"
              echo ""
              echo "Avalonia desktop client for RealmUnbound."
              echo ""
              echo "### Packages"
              echo "- \`RealmUnbound-Client-Windows-$VERSION.zip\` — Windows desktop app (win-x64, self-contained)"
              echo "- \`RealmUnbound-Client-Linux-$VERSION.zip\` — Linux desktop app (linux-x64, self-contained)"
              echo "- \`RealmUnbound-Client-macOS-x64-$VERSION.zip\` — macOS desktop app (osx-x64, Intel, self-contained)"
              echo "- \`RealmUnbound-Client-macOS-arm64-$VERSION.zip\` — macOS desktop app (osx-arm64, Apple Silicon, self-contained)"
              echo ""
              echo "### Changes"
              printf '%s\n' "$CHANGELOG"
            } > release-body.md
            ;;
          foundry)
            NAME="RealmFoundry $VERSION"
            {
              echo "## RealmFoundry $VERSION"
              echo ""
              echo "Blazor Server community content portal for RealmUnbound."
              echo ""
              echo "### Packages"
              echo "- \`RealmFoundry-$VERSION.zip\` -- ASP.NET Core publish output"
              echo ""
              echo "### Changes"
              printf '%s\n' "$CHANGELOG"
            } > release-body.md
            ;;
          discord)
            NAME="RealmUnbound Discord Bot $VERSION"
            {
              echo "## RealmUnbound Discord Bot $VERSION"
              echo ""
              echo "The Herald — Discord bot for RealmUnbound."
              echo ""
              echo "### Docker Image"
              echo '```'
              echo "docker pull ghcr.io/$REPO_OWNER_LC/realmunbound-discord:$VERSION"
              echo '```'
              echo ""
              echo "### Packages"
              echo "- \`RealmUnbound-Discord-$VERSION.zip\` — ASP.NET Core publish output (framework-dependent)"
              echo ""
              echo "### Changes"
              printf '%s\n' "$CHANGELOG"
            } > release-body.md
            ;;
        esac

        echo "name=$NAME" >> $GITHUB_OUTPUT

    # ── Create the GitHub Release ─────────────────────────────────────────────
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.meta.outputs.tag }}
        name: ${{ steps.release-meta.outputs.name }}
        body_path: release-body.md
        files: artifacts/**
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
