name: Create Release on Tag

on:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed
    branches:
      - main

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: 'Release'

jobs:
  create-release:
    name: Create GitHub Release from Artifacts
    runs-on: windows-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    permissions:
      contents: write
      actions: read
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history for changelog and tag info
    
    - name: Get tag name from workflow run
      id: get-tag
      run: |
        # Get the tag that triggered the workflow
        $refName = "${{ github.event.workflow_run.head_branch }}"
        Write-Output "Workflow run branch: $refName"
        
        # Get all tags pointing to the workflow run commit
        $commit = "${{ github.event.workflow_run.head_sha }}"
        Write-Output "Workflow run commit: $commit"
        
        $tags = git tag --points-at $commit
        $vTag = $tags | Where-Object { $_ -like "v*" } | Select-Object -First 1
        
        if ([string]::IsNullOrEmpty($vTag)) {
          Write-Output "No version tag found for commit $commit"
          Write-Output "Available tags: $tags"
          exit 1
        }
        
        Write-Output "Found tag: $vTag"
        $version = $vTag.TrimStart('v')
        
        Write-Output "tag=$vTag" >> $env:GITHUB_OUTPUT
        Write-Output "version=$version" >> $env:GITHUB_OUTPUT
        Write-Output "VERSION=$version" >> $env:GITHUB_ENV
        Write-Output "TAG=$vTag" >> $env:GITHUB_ENV
      shell: pwsh
    
    - name: Download all package artifacts
      uses: actions/download-artifact@v4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        run-id: ${{ github.event.workflow_run.id }}
        path: ./artifacts
    
    - name: List downloaded artifacts
      run: |
        Write-Output "Downloaded artifacts:"
        Get-ChildItem -Path ./artifacts -Recurse | Select-Object FullName
      shell: pwsh
    
    - name: Prepare release files
      id: prepare
      run: |
        $version = "${{ env.VERSION }}"
        Write-Output "Preparing release files for version: $version"
        
        # Create release directory
        New-Item -ItemType Directory -Force -Path ./release
        
        # Copy all package artifacts to release directory
        Get-ChildItem -Path ./artifacts -Filter "*.zip" -Recurse | ForEach-Object {
          Copy-Item $_.FullName -Destination ./release/
          Write-Output "Copied: $($_.Name)"
        }
        
        # Copy manifest
        $manifestPath = Get-ChildItem -Path ./artifacts -Filter "package-manifest.json" -Recurse | Select-Object -First 1
        if ($manifestPath) {
          Copy-Item $manifestPath.FullName -Destination ./release/package-manifest.json
          Write-Output "Copied: package-manifest.json"
          
          # Extract metadata from manifest
          $manifest = Get-Content $manifestPath.FullName | ConvertFrom-Json
          $jsonCount = $manifest.Components.JsonData.FileCount
          Write-Output "json-count=$jsonCount" >> $env:GITHUB_OUTPUT
          Write-Output "JSON_COUNT=$jsonCount" >> $env:GITHUB_ENV
        } else {
          Write-Output "Warning: package-manifest.json not found"
          Write-Output "json-count=0" >> $env:GITHUB_OUTPUT
          Write-Output "JSON_COUNT=0" >> $env:GITHUB_ENV
        }
        
        Write-Output "Release files prepared:"
        Get-ChildItem -Path ./release | Select-Object Name, Length
      shell: pwsh
      
    - name: Generate changelog
      id: changelog
      run: |
        # Get previous tag
        $currentTag = "${{ env.TAG }}"
        $tags = git tag --sort=-version:refname
        $prevTag = $tags | Where-Object { $_ -ne $currentTag } | Select-Object -First 1
        
        if ($prevTag) {
          Write-Output "Generating changelog from $prevTag to $currentTag"
          $commits = git log "$prevTag..$currentTag" --pretty=format:"- %s (%h)" --no-merges
        } else {
          Write-Output "Generating changelog for all commits (first release)"
          $commits = git log --pretty=format:"- %s (%h)" --no-merges --max-count=20
        }
        
        $changelog = $commits -join "`n"
        if ([string]::IsNullOrWhiteSpace($changelog)) {
          $changelog = "- Initial release"
        }
        
        Write-Output "changelog<<EOF" >> $env:GITHUB_OUTPUT
        Write-Output $changelog >> $env:GITHUB_OUTPUT
        Write-Output "EOF" >> $env:GITHUB_OUTPUT
      shell: pwsh
      
    - name: Generate release notes
      run: |
        $version = "${{ env.VERSION }}"
        $jsonCount = "${{ steps.prepare.outputs.json-count }}"
        $commit = "${{ github.event.workflow_run.head_sha }}"
        $repoUrl = "${{ github.server_url }}/${{ github.repository }}"
        $repoOwner = "${{ github.repository_owner }}"
        $changelog = "${{ steps.changelog.outputs.changelog }}"
        
        # Run external script
        ./scripts/generate-release-notes.ps1 `
          -Version $version `
          -JsonCount $jsonCount `
          -Changelog $changelog `
          -Commit $commit `
          -RepoUrl $repoUrl `
          -RepoOwner $repoOwner `
          -OutputFile "release-notes.md"
      shell: pwsh
      
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        body_path: release-notes.md
        draft: false
        prerelease: false
        generate_release_notes: false
        tag_name: ${{ env.TAG }}
        name: RealmEngine ${{ env.VERSION }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
