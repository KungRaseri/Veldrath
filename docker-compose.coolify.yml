# docker-compose.coolify.yml â€” Coolify-compatible single-file compose stack for veldrath.com
#
# Generated from: docker-compose.yml (base) + docker-compose.prod.yml (overlay)
# Caddy reverse proxy REMOVED â€” routing, TLS, and sticky sessions handled by Coolify's built-in Traefik.
# Traefik labels have been removed; Coolify auto-generates routing labels.
# All .NET services use pre-built GHCR images (no local build contexts).
# All host port mappings removed â€” traffic routed via Traefik on the coolify network.
#
# Pre-deploy prerequisites:
#   1. Add curl to RealmFoundry/Dockerfile and Veldrath.Web/Dockerfile runtime stages
#   2. Add health check endpoints in Program.cs for foundry, web, and discord
#   3. Configure GHCR registry credentials in Coolify
#   4. Create Coolify secrets for all ${VARIABLE} references (see plans/docker-compose-coolify-spec.md)

services:
  # â”€â”€ Application Services â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  server:
    image: ghcr.io/kungraseri/veldrath-server:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SSL Mode=Require;
      - Database__Provider=postgres
      - Jwt__Key=${JWT_KEY}
      - OAuth__Discord__ClientId=${OAUTH_DISCORD_CLIENT_ID}
      - OAuth__Discord__ClientSecret=${OAUTH_DISCORD_CLIENT_SECRET}
      - OAuth__Google__ClientId=${OAUTH_GOOGLE_CLIENT_ID}
      - OAuth__Google__ClientSecret=${OAUTH_GOOGLE_CLIENT_SECRET}
      - OAuth__Microsoft__ClientId=${OAUTH_MICROSOFT_CLIENT_ID}
      - OAuth__Microsoft__ClientSecret=${OAUTH_MICROSOFT_CLIENT_SECRET}
      - Email__SmtpHost=${EMAIL_SMTP_HOST}
      - Email__SmtpPort=${EMAIL_SMTP_PORT:-587}
      - Email__EnableTls=${EMAIL_ENABLE_TLS:-true}
      - Email__User=${EMAIL_USER}
      - Email__Password=${EMAIL_PASSWORD}
      - Email__SenderAddress=${EMAIL_SENDER_ADDRESS:-noreply@veldrath.com}
      - Email__SenderName=Veldrath
      - Foundry__BaseUrl=https://foundry.veldrath.com
      - Web__BaseUrl=https://veldrath.com
      - Auth__CookieDomain=.veldrath.com
      - Seq__ServerUrl=http://veldrath-seq
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys
    restart: unless-stopped
    networks:
      - veldrath
      - coolify
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "1.0"

  discord:
    image: ghcr.io/kungraseri/veldrath-discord:latest
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Discord__Token=${DISCORD_TOKEN}
      - Discord__DevGuildId=${DISCORD_DEV_GUILD_ID:-0}
      - Discord__ServerBaseUrl=http://server:8080
      - ConnectionStrings__DefaultConnection=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    # TODO: Switch to HTTP health check after Discord Dockerfile moves to aspnet image
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 10s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x dotnet || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - veldrath
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"

  foundry:
    image: ghcr.io/kungraseri/realmfoundry:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8081
      - Veldrath__ServerUrl=http://server:8080
      - Veldrath__PublicServerUrl=${FOUNDRY_PUBLIC_SERVER_URL:-https://api.veldrath.com}
      - Auth__CookieDomain=.veldrath.com
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - foundry_dataprotection_keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - veldrath
      - coolify
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  web:
    image: ghcr.io/kungraseri/veldrath-web:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8082
      - Veldrath__ServerUrl=http://server:8080
      - Veldrath__PublicServerUrl=${WEB_PUBLIC_SERVER_URL:-https://api.veldrath.com}
      - Auth__CookieDomain=.veldrath.com
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - web_dataprotection_keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - veldrath
      - coolify
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

# â”€â”€ Networks â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

networks:
  veldrath:
    driver: bridge
  coolify:
    external: true

# â”€â”€ Volumes â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

volumes:
  dataprotection_keys:
  foundry_dataprotection_keys:
  web_dataprotection_keys:
